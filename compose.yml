name: idshka

services:
  app:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    env_file:
      - .env
    entrypoint: ["/bin/sh", "/var/www/html/infra/docker/php/entrypoint.sh"]
    command: ["php-fpm", "-F"]
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./infra/docker/php/fpm-non-root.conf:/usr/local/etc/php-fpm.d/zz-idshka-non-root.conf:ro
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && su-exec www-data php artisan migrate:status --no-interaction >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - idshka

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./:/var/www/html
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - idshka

  pgsql:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-idshka}
      POSTGRES_USER: ${DB_USERNAME:-idshka}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-idshka-local-dev}
    volumes:
      - idshka-pgsql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-idshka} -d ${DB_DATABASE:-idshka}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - idshka

  redis:
    image: redis:7-alpine
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-idshka-local-dev}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -lc
      - |
          password="$$REDIS_PASSWORD"
          if [ -z "$$password" ] || [ "$$password" = "null" ]; then
            password="$$DB_PASSWORD"
          fi
          echo "[FIX:runtime-hardening] starting redis with authenticated local runtime" >&2
          exec redis-server --appendonly yes --requirepass "$$password"
    volumes:
      - idshka-redis:/data
    networks:
      - idshka

  demo-resource-gateway:
    profiles: ["examples"]
    build:
      context: .
      dockerfile: infra/openresty/demo-resource/Dockerfile
    environment:
      GATEWAY_LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-warn}
      GATEWAY_JWKS_CACHE_SECONDS: ${GATEWAY_JWKS_CACHE_SECONDS:-20}
    depends_on:
      nginx:
        condition: service_started
      demo-resource-api:
        condition: service_started
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./infra/openresty/demo-resource/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./infra/openresty/demo-resource/lua:/etc/openresty/lua:ro
    networks:
      - idshka

  demo-resource-api:
    profiles: ["examples"]
    image: nginx:1.29-alpine
    volumes:
      - ./examples/demo-resource-api/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - idshka

  idshka-web-client:
    profiles: ["examples"]
    build:
      context: .
      dockerfile: examples/idshka-web-client/Dockerfile
    environment:
      PORT: 8443
      IDSHKA_PUBLIC_URL: ${IDSHKA_PUBLIC_URL:-http://localhost:8080}
      IDSHKA_INTERNAL_URL: ${IDSHKA_INTERNAL_URL:-http://nginx}
      IDSHKA_CLIENT_ID: ${IDSHKA_CLIENT_ID:-}
      IDSHKA_CLIENT_SECRET: ${IDSHKA_CLIENT_SECRET:-}
      IDSHKA_REDIRECT_URI: ${IDSHKA_REDIRECT_URI:-https://localhost:8443/auth/idshka/callback}
      IDSHKA_SESSION_SECRET: ${IDSHKA_SESSION_SECRET:-idshka-web-client-local-session-secret}
    depends_on:
      nginx:
        condition: service_started
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - idshka-web-client-certs:/certs
    networks:
      - idshka

  idshka-api-token-inspector:
    profiles: ["examples"]
    build:
      context: .
      dockerfile: examples/idshka-api-token-inspector/Dockerfile
    environment:
      PORT: 8444
      IDSHKA_ISSUER: ${IDSHKA_PUBLIC_URL:-http://localhost:8080}
      IDSHKA_JWKS_URL: ${IDSHKA_JWKS_URL:-http://nginx/oauth/jwks.json}
      IDSHKA_JWKS_TIMEOUT_MS: ${IDSHKA_JWKS_TIMEOUT_MS:-15000}
      IDSHKA_JWKS_RETRY_COUNT: ${IDSHKA_JWKS_RETRY_COUNT:-1}
      IDSHKA_CLOCK_TOLERANCE_SECONDS: ${IDSHKA_CLOCK_TOLERANCE_SECONDS:-5}
    depends_on:
      nginx:
        condition: service_started
    ports:
      - "127.0.0.1:8444:8444"
    volumes:
      - idshka-web-client-certs:/certs
    networks:
      - idshka

networks:
  idshka:
    driver: bridge

volumes:
  idshka-pgsql:
  idshka-redis:
  idshka-web-client-certs:
