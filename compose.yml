name: idshka

services:
  app:
    build:
      context: .
      dockerfile: infra/docker/php/Dockerfile
    env_file:
      - .env
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - idshka

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - idshka

  pgsql:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-idshka}
      POSTGRES_USER: ${DB_USERNAME:-idshka}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "54320:5432"
    volumes:
      - idshka-pgsql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-idshka} -d ${DB_DATABASE:-idshka}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - idshka

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "63790:6379"
    volumes:
      - idshka-redis:/data
    networks:
      - idshka

  gateway:
    image: openresty/openresty:1.27.1.2-alpine-fat
    ports:
      - "8081:8081"
    volumes:
      - ./infra/openresty/apishka/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./infra/openresty/apishka/lua:/etc/openresty/lua:ro
    networks:
      - idshka

networks:
  idshka:
    driver: bridge

volumes:
  idshka-pgsql:
  idshka-redis:
