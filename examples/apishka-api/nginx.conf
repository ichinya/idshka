server {
    listen 8082;
    server_name _;
    server_tokens off;
    default_type application/json;

    location = /healthz {
        return 200 '{"status":"ok","service":"apishka-api"}';
    }

    location / {
        return 200 '{"authenticated":"$http_x_idshka_authenticated","user_id":"$http_x_idshka_user_id","site_id":"$http_x_idshka_site_id","audience":"$http_x_idshka_audience","scopes":"$http_x_idshka_scopes","permissions":"$http_x_idshka_permissions","jti":"$http_x_idshka_jti","token_exp":"$http_x_idshka_token_exp","request_id":"$http_x_request_id","authorization":"$http_authorization","canary":"$http_x_idshka_canary"}';
    }
}
