worker_processes 1;

events {
    worker_connections 1024;
}

http {
    default_type application/json;
    access_log /dev/stdout;
    error_log /dev/stderr warn;
    lua_package_path "/etc/openresty/lua/?.lua;;";
    server_tokens off;

    server {
        listen 8081;
        server_name _;

        location = /healthz {
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"apishka-gateway-skeleton"}';
        }

        location / {
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
            add_header Content-Type application/json;
            return 501 '{"error":"gateway_not_implemented","message":"Gateway validation flow will be implemented in plan 05."}';
        }
    }
}
