worker_processes 1;

events {
    worker_connections 1024;
}

http {
    default_type application/json;
    access_log /dev/stdout;
    error_log /dev/stderr warn;
    lua_package_path "/etc/openresty/lua/?.lua;;";

    server {
        listen 8081;
        server_name _;

        location = /healthz {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"apishka-gateway-skeleton"}';
        }

        location / {
            add_header Content-Type application/json;
            return 501 '{"error":"gateway_not_implemented","message":"Gateway validation flow will be implemented in plan 05."}';
        }
    }
}
