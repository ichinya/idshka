env GATEWAY_LOG_LEVEL;

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    default_type application/json;
    access_log /dev/stdout;
    error_log /dev/stderr warn;
    lua_package_path "/etc/openresty/lua/?.lua;;";
    lua_shared_dict idshka_jwks 1m;
    server_tokens off;

    server {
        listen 8081;
        server_name _;

        set $idshka_issuer "http://localhost:8080";
        set $idshka_audience "example.test";
        set $idshka_allowed_alg "RS256";
        set $idshka_jwks_cache_seconds "120";
        set $idshka_clock_skew_seconds "5";

        location = /healthz {
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"demo-resource-gateway"}';
        }

        location = /__idshka_jwks {
            internal;
            proxy_pass http://nginx/oauth/jwks.json;
            proxy_set_header Host localhost;
            proxy_set_header X-Request-Id $request_id;
        }

        location / {
            default_type application/json;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;

            access_by_lua_block {
                local jwt_validate = require("jwt_validate")
                local context_headers = require("context_headers")

                local claims, error_response = jwt_validate.validate({
                    issuer = ngx.var.idshka_issuer,
                    audience = ngx.var.idshka_audience,
                    allowed_alg = ngx.var.idshka_allowed_alg,
                    jwks_cache_seconds = tonumber(ngx.var.idshka_jwks_cache_seconds) or 120,
                    clock_skew_seconds = tonumber(ngx.var.idshka_clock_skew_seconds) or 0,
                    request_id = ngx.var.request_id,
                })

                if claims == nil then
                    return jwt_validate.reject(error_response, ngx.var.request_id)
                end

                context_headers.apply(claims, ngx.var.request_id)
            }

            proxy_pass http://demo-resource-api:8082;
            proxy_set_header Authorization "";
            proxy_set_header X-Request-Id $request_id;
        }
    }
}
