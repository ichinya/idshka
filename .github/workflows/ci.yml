name: ci

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: bcmath, pdo_sqlite, redis
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Audit PHP dependencies
        run: composer audit

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi --force

      - name: Smoke Laravel route and config cache
        run: |
          php artisan config:cache
          php artisan route:list --except-vendor
          php artisan config:clear

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Build frontend assets
        run: npm run build

      - name: Run hardening test suites
        run: |
          php artisan test --without-tty \
            tests/Feature/SecurityRateLimitTest.php \
            tests/Feature/SigningKeyCommandTest.php \
            tests/Unit/SecurityRunbookDocumentationTest.php \
            tests/Unit/GatewayLoggingSafetyTest.php

      - name: Run test suite
        run: php artisan test --without-tty

      - name: Validate Docker Compose definition
        run: |
          docker compose config > /dev/null
          docker compose --profile examples config > /dev/null

      - name: Start container runtime for ingress smoke
        run: docker compose up -d --build

      - name: Smoke public ingress hardening
        run: |
          for attempt in {1..30}; do
            health_status="$(curl -s -o /tmp/idshka-health.json -w "%{http_code}" http://127.0.0.1:8080/health || true)"
            if [ "$health_status" = "200" ]; then
              break
            fi
            sleep 2
          done

          test "$health_status" = "200"

          ready_status="$(curl -s -o /tmp/idshka-ready.json -w "%{http_code}" http://127.0.0.1:8080/ready || true)"
          test "$ready_status" = "403"

      - name: Start demo resource gateway runtime
        run: docker compose --profile examples up -d --build demo-resource-gateway

      - name: Smoke API resource gateway
        run: bash infra/openresty/demo-resource/smoke.sh

      - name: Show container logs on smoke failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop container runtime smoke stack
        if: always()
        run: docker compose down -v
