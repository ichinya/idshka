  - feature/unit tests and docs sync
acceptance:
  - "GET /oauth/authorize validates client_id, exact redirect_uri, response_type=code, scope, state, nonce, code_challenge and code_challenge_method=S256"
  - "Valid authorize request for an authenticated user redirects to the registered callback with code and original state"
  - "Unknown client, revoked client, unverified site, missing web_client mode, invalid scope, redirect mismatch and missing PKCE fail closed"
  - "Authorization code is short-lived, stored only as a hash, bound to client/user/site/redirect URI/nonce/PKCE, and consumed once"
  - "POST /oauth/token exchanges a valid code plus PKCE verifier for tokens and rejects replay/mismatched verifier"
  - "id_token contains iss, aud/client_id, sub, site_id, nonce, iat, nbf, exp, jti, kid and typ=JWT"
  - "GET /oauth/userinfo returns claims only for a valid web access token and requested scopes"
  - "Raw authorization code, client_secret, id_token, access_token and private keys are never logged"
  - "example apishka-web-laravel creates a local session using only public HTTP/OAuth endpoints"
