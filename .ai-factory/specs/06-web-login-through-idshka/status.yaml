outputs:
  - OAuth/OIDC web-client issuer config and contracts
  - oidc_clients schema and model
  - oidc_redirect_uris schema and model
  - oauth_authorization_codes schema and model
  - OIDC client resolver and exact redirect URI matcher
  - PKCE service
  - GET /oauth/authorize
  - POST /oauth/token
