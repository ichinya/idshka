status: completed
plan_id: 04-token-issuer-and-jwks
area:
  - issuer
  - security
  - laravel
dependencies:
  - 03-site-registry-and-modes
outputs:
  - JWT/JWK dependency and issuer config
  - app/Contracts/Auth/JwtClaims.php
  - app/Contracts/Auth/Scopes.php
  - signing_keys schema and model
  - api_tokens schema and model
  - revoked_jti schema and model
  - SigningKeyService
  - JwksService
  - TokenIssuer
  - IssueUserApiTokenAction
  - RevocationService
  - GET /oauth/jwks.json
  - POST /api/v1/user/api-tokens
  - POST /api/v1/user/api-tokens/{id}/revoke
acceptance:
  - "Можно выпустить user API token для verified owned site с mode api_resource и aud=apishka.ru"
  - "JWT содержит iss/aud/sub/site_id/token_type=user_api/scope/permissions/jti/iat/nbf/exp"
  - "JWT header содержит kid, допустимый alg и typ=JWT"
  - "JWKS содержит active public key по kid и не содержит private key material"
  - "Raw token показывается только один раз и не хранится/не логируется в сыром виде"
  - "Revoke idempotent, пишет api_tokens.revoked_at и revoked_jti; Redis denylist optional"
  - "Unverified site, чужой site, site без api_resource и invalid scopes fail closed"
  - "Token issue/revoke имеют audit events, rate limits и deterministic JSON errors"
