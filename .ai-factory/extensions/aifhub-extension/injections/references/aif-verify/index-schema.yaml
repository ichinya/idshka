stats:
  total: 0
  by_verdict:
    pass: 0
    pass-with-notes: 0
  by_tag: {}

_schema:
  spec_entry:
    id: "plan-id (slug format)"
    title: "Human-readable title"
    completed: "YYYY-MM-DD"
    verdict: "pass | pass-with-notes"
    files_changed: "number of files modified/created"
    tests_added: "number of new tests"
    tags: ["list", "of", "tags"]
    issue: "issue number (optional)"
    pr: "pull request number (optional)"
